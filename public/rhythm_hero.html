<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm Hero - Tosito Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --sky: #38BDF8;
            --pink: #f472b6;
            --purple: #818CF8;
            --green: #10B981;
            --red: #EF4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: var(--bg); color: white;
            font-family: 'Orbitron', sans-serif;
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }

        canvas {
            display: block; max-width: 100%; max-height: 100%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #000;
        }

        .ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
            padding: 2rem;
        }

        .hud {
            width: 100%; display: flex; justify-content: space-between;
            align-items: flex-start; z-index: 10;
        }

        .score-box { text-align: left; }
        .score-val { font-size: 3rem; font-weight: 900; color: var(--sky); text-shadow: 0 0 20px rgba(56,189,248,0.5); }
        .score-lbl { font-size: 0.8rem; letter-spacing: 2px; color: var(--purple); }

        .combo-box { 
            position: absolute; top: 50%; transform: translateY(-50%);
            text-align: center; width: 100%;
        }
        .combo-num { font-size: 5rem; font-weight: 900; color: white; opacity: 0; transition: opacity 0.1s; }
        .combo-text { font-size: 1rem; color: var(--pink); letter-spacing: 4px; }

        .feedback-text {
            position: absolute; top: 60%; font-size: 2rem; font-weight: 900;
            color: var(--sky); text-transform: uppercase; letter-spacing: 4px;
            opacity: 0; transform: scale(0.5);
        }

        /* Menu */
        #menu {
            position: absolute; inset: 0; z-index: 100;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(15px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 2rem; text-align: center;
        }

        .logo { font-size: 4rem; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-start {
            padding: 1.2rem 3rem; border-radius: 99px; background: white; color: var(--bg);
            border: none; font-weight: 900; font-size: 1.2rem; cursor: pointer;
            transition: all 0.3s; pointer-events: auto;
        }
        .btn-start:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--pink); }

        .exit-btn {
            position: absolute; top: 20px; left: 20px;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; pointer-events: auto; cursor: pointer;
            display: flex; align-items: center; justify-content: center; z-index: 200;
        }

        /* Controls hint */
        .controls-hint {
            position: absolute; bottom: 20px; color: rgba(255,255,255,0.4);
            font-size: 0.7rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>

        <div class="ui-layer">
            <button class="exit-btn" onclick="exitGame()">🏠</button>

            <div class="hud">
                <div class="score-box">
                    <div class="score-val" id="score">000000</div>
                    <div class="score-lbl">PUNTUACIÓN</div>
                </div>
            </div>

            <div class="combo-box">
                <div class="combo-num" id="combo">0</div>
                <div class="combo-text" id="combo-lbl" style="visibility:hidden">COMBO</div>
            </div>

            <div class="feedback-text" id="feedback">PERFECT</div>

            <div id="menu">
                <h1 class="logo">RHYTHM<br>HERO</h1>
                <p style="color:var(--muted); margin-bottom:1rem;">Domina el ritmo. Sincroniza tus pulsaciones.</p>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <button class="btn-start" onclick="startGame()">EMPEZAR JUEGO</button>
                    <p style="font-size:0.7rem; color:var(--sky);">TECLAS: [S] [D] [F] [G] o D-PAD</p>
                </div>
            </div>

            <div class="controls-hint">PULSA LAS TECLAS CUANDO LAS NOTAS LLEGUEN AL CÍRCULO</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const comboEl = document.getElementById('combo');
        const comboLbl = document.getElementById('combo-lbl');
        const feedbackEl = document.getElementById('feedback');
        const menu = document.getElementById('menu');

        let width, height;
        let isStarted = false;
        let score = 0;
        let combo = 0;
        let lastTime = 0;
        let notes = [];
        let particles = [];

        const LANES = 4;
        const COLORS = ['#38BDF8', '#f472b6', '#818CF8', '#10B981'];
        const KEYS = ['s', 'd', 'f', 'g'];
        const LANE_KEYS = { 's': 0, 'd': 1, 'f': 2, 'g': 3, 'ArrowLeft': 0, 'ArrowDown': 1, 'ArrowUp': 2, 'ArrowRight': 3 };

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            canvas.style.height = '100vh'; 
            canvas.style.width = '100vw';
        }

        window.addEventListener('resize', resize);
        resize();

        // Game Logic
        class Note {
            constructor(lane, time) {
                this.lane = lane;
                this.time = time; // Target hit time
                this.y = -100;
                this.hit = false;
                this.missed = false;
            }

            update(currentTime, speed) {
                // Distancia al objetivo (height * 0.85)
                const targetY = height * 0.85;
                const timeDiff = this.time - currentTime;
                this.y = targetY - (timeDiff * speed);
                
                if (this.y > height && !this.hit && !this.missed) {
                    this.missed = true;
                    onMiss();
                }
            }

            draw() {
                if (this.hit || this.missed) return;
                const laneWidth = width / LANES;
                const cx = (this.lane + 0.5) * laneWidth;
                
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = COLORS[this.lane];
                ctx.fillStyle = COLORS[this.lane];
                
                // Draw rounded rect note
                const nw = laneWidth * 0.7;
                const nh = 20;
                ctx.beginPath();
                ctx.roundRect(cx - nw/2, this.y - nh/2, nw, nh, 5);
                ctx.fill();
                
                // Glow line
                ctx.strokeStyle = "rgba(255,255,255,0.5)";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.restore();
            }
        }

        function spawnNotes() {
            const now = performance.now();
            // Generate a simple pattern
            for (let i = 0; i < 500; i++) {
                const lane = Math.floor(Math.random() * LANES);
                notes.push(new Note(lane, now + 2000 + i * 500));
            }
        }

        function onHit(precision) {
            score += Math.floor(100 * precision);
            combo++;
            scoreEl.textContent = score.toString().padStart(6, '0');
            
            if (combo > 5) {
                comboEl.textContent = combo;
                comboEl.style.opacity = 1;
                comboLbl.style.visibility = 'visible';
            }

            let text = "GOOD";
            let color = "white";
            if (precision > 0.9) { text = "PERFECT"; color = varColor('--sky'); }
            else if (precision > 0.7) { text = "GREAT"; color = varColor('--pink'); }
            
            showFeedback(text, color);
        }

        function onMiss() {
            combo = 0;
            comboEl.style.opacity = 0;
            comboLbl.style.visibility = 'hidden';
            showFeedback("MISS", "gray");
        }

        function showFeedback(text, color) {
            feedbackEl.textContent = text;
            feedbackEl.style.color = color;
            gsap.killTweensOf(feedbackEl);
            gsap.fromTo(feedbackEl, 
                { opacity: 0, scale: 0.5, y: -20 },
                { opacity: 1, scale: 1.2, y: 0, duration: 0.2, ease: "back.out(2)", onComplete: () => {
                    gsap.to(feedbackEl, { opacity: 0, delay: 0.5 });
                }}
            );
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        function drawLanes() {
            const laneWidth = width / LANES;
            const targetY = height * 0.85;

            // Lines
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            ctx.lineWidth = 1;
            for (let i = 1; i < LANES; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, height);
                ctx.stroke();
            }

            // Target Area
            for (let i = 0; i < LANES; i++) {
                const cx = (i + 0.5) * laneWidth;
                ctx.beginPath();
                ctx.arc(cx, targetY, laneWidth * 0.35, 0, Math.PI * 2);
                ctx.strokeStyle = COLORS[i];
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // Active Glow
                if (activeKeys[i]) {
                    ctx.save();
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = COLORS[i];
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        const activeKeys = [false, false, false, false];

        window.addEventListener('keydown', (e) => {
            if (!isStarted) return;
            const lane = LANE_KEYS[e.key];
            if (lane !== undefined && !activeKeys[lane]) {
                activeKeys[lane] = true;
                checkHit(lane);
            }
        });

        window.addEventListener('keyup', (e) => {
            const lane = LANE_KEYS[e.key];
            if (lane !== undefined) activeKeys[lane] = false;
        });

        function checkHit(lane) {
            const now = performance.now();
            const threshold = 150; // ms
            const targetY = height * 0.85;

            // Find nearest note in this lane
            let nearest = null;
            let minDist = Infinity;

            notes.forEach(note => {
                if (note.lane === lane && !note.hit && !note.missed) {
                    const diff = Math.abs(note.time - now);
                    if (diff < threshold && diff < minDist) {
                        minDist = diff;
                        nearest = note;
                    }
                }
            });

            if (nearest) {
                nearest.hit = true;
                const precision = 1 - (minDist / threshold);
                onHit(precision);
            }
        }

        function loop(time) {
            if (!isStarted) return;
            
            ctx.clearRect(0, 0, width, height);
            
            drawLanes();
            
            const speed = 0.5; // pixel per ms
            const now = performance.now();
            
            notes.forEach(note => {
                note.update(now, speed);
                note.draw();
            });

            requestAnimationFrame(loop);
        }

        function startGame() {
            gsap.to(menu, { opacity: 0, duration: 0.5, onComplete: () => {
                menu.style.display = 'none';
                isStarted = true;
                spawnNotes();
                requestAnimationFrame(loop);
            }});
        }

        function exitGame() {
            if (window.parent && window.parent.exitHubGame) {
                window.parent.exitHubGame();
            } else {
                window.history.back();
            }
        }
        
    </script>
</body>
</html>
