<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="wrapper" style="width: 100vw; height: 100vh; overflow: hidden; position: relative; background: #000;">
    <!-- We keep the iframe slightly taller than the viewport and clip the bottom -->
    <iframe id="siteFrame" src="https://www.beepbox.co/" title="Embedded site" sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-same-origin allow-scripts" allow="fullscreen" 
      style="position: absolute; top: 0; left: 0; width: 100%; height: 115vh; border: none; background: #000;"></iframe>
    
    <!-- Floating Home Button -->
    <button id="exitBtn" onclick="parent.exitHubGame()" style="position:fixed; top:20px; left:20px; width:44px; height:44px; border-radius:50%; background:rgba(0,0,0,0.8); color:white; border:1px solid rgba(255,255,255,0.3); cursor:pointer; z-index:9999; display:flex; align-items:center; justify-content:center; font-size:20px; backdrop-filter:blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.5);">🏠</button>

    <!-- Visual masking at the very bottom to ensure instructions are never seen -->
    <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: #000; z-index: 9998; pointer-events: none;"></div>

    <!-- Bases Espectaculares Sidebar -->
    <div id="basesSidebar">
      <div id="basesToggle" onclick="toggleBases()">🎵</div>
      <h2><span style="font-size: 1.2rem;">✨</span> Bases Pro</h2>
      
      <button class="base-btn" data-genre="synthwave" onclick="loadBase('synthwave')">
        <span class="name">🎹 Synthwave Night</span>
        <span class="desc">Bajos pulsantes y leads de neón.</span>
      </button>

      <button class="base-btn" data-genre="8bit" onclick="loadBase('8bit')">
        <span class="name">🕹️ Arcade Classic</span>
        <span class="desc">Sonido retro 8-bit estilo GameBoy.</span>
      </button>

      <button class="base-btn" data-genre="lofi" onclick="loadBase('lofi')">
        <span class="name">🌃 Lo-Fi Chill</span>
        <span class="desc">Beats relajados y ambiente jazz.</span>
      </button>

      <button class="base-btn" data-genre="trap" onclick="loadBase('trap')">
        <span class="name">🔥 Trap Beat</span>
        <span class="desc">Hi-hats rápidos y bajos potentes.</span>
      </button>

      <button class="base-btn" data-genre="orchestra" onclick="loadBase('orchestra')">
        <span class="name">🎻 Epic Orchestra</span>
        <span class="desc">Cuerdas y vientos cinemáticos.</span>
      </button>

      <p style="font-size: 0.6rem; color: rgba(255,255,255,0.3); text-align: center; margin-top: 10px;">
        Haz clic en una base para cargarla y modificala a tu gusto.
      </p>
    </div>
  </div>

  <!-- Audio Context Activator (Optional, helps with the warning) -->

  <div id="audio-hint" style="position:fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: rgba(56,189,248,0.2); border: 1px solid var(--sky); border-radius: 8px; color: #fff; font-size: 0.7rem; pointer-events: none; opacity: 0.8; z-index: 10000; font-family: sans-serif;">
    PULSA EN CUALQUIER LUGAR PARA ACTIVAR AUDIO
  </div>

  <script src="script.js"></script>
</body>
</html>
