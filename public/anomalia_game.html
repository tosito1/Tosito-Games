    <script type="text/babel" data-type="module">

        // --- BRIDGE PARAMS ---
        const urlParams = new URLSearchParams(window.location.search);
        const HUB_APP_ID = urlParams.get('appId') || 'default-app-id';
        const configStr = urlParams.get('config');
        const FIREBASE_CONFIG = configStr ? JSON.parse(decodeURIComponent(configStr)) : {};
        const AUTH_TOKEN = urlParams.get('token');
        const PLAYER_NAME = urlParams.get('user') || 'Agente';

        // --- SFX ENGINE ---
        class SFXEngine {
            constructor() { this.ctx = null; this.masterGain = null; }
            init() {
                if (!this.ctx) {
                    const AudioCtx = window.AudioContext || window.webkitAudioContext;
                    if (!AudioCtx) return;
                    this.ctx = new AudioCtx();
                    this.masterGain = this.ctx.createGain();
                    this.masterGain.gain.value = 0.2;
                    this.masterGain.connect(this.ctx.destination);
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            playTone(freq, type, duration, slideFreq, vol = 1) {
                if (!this.ctx || !this.masterGain) return;
                const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.masterGain); osc.start(); osc.stop(this.ctx.currentTime + duration);
            }
            playNoise(duration, isExplosion = false, vol = 1) {
                if (!this.ctx || !this.masterGain) return;
                const bufferSize = this.ctx.sampleRate * duration; const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate); const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noiseSource = this.ctx.createBufferSource(); noiseSource.buffer = buffer;
                const filter = this.ctx.createBiquadFilter(); filter.type = isExplosion ? 'lowpass' : 'bandpass';
                filter.frequency.setValueAtTime(isExplosion ? 1000 : 600, this.ctx.currentTime);
                if (isExplosion) filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + duration);
                const gain = this.ctx.createGain(); gain.gain.setValueAtTime(isExplosion ? vol * 1.5 : vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                noiseSource.connect(filter); filter.connect(gain); gain.connect(this.masterGain); noiseSource.start(); noiseSource.stop(this.ctx.currentTime + duration);
            }
            shoot(isPlayer, isHeavy = false) { if (isPlayer) this.playTone(isHeavy ? 400 : 800, 'square', 0.15, isHeavy ? 100 : 400, 0.5); else this.playTone(500, 'sawtooth', 0.2, 200, 0.3); }
            explosion(size) { this.playNoise(size > 20 ? 0.6 : 0.2, true, size > 20 ? 1.5 : 0.6); }
            pickup() { this.playTone(1200, 'sine', 0.08, 1800, 0.3); }
            levelUp() { if (!this.ctx) return;[523.25, 659.25, 783.99, 1046.50].forEach((f, i) => { setTimeout(() => this.playTone(f, 'square', 0.2, undefined, 0.4), i * 80); }); }
            dash() { this.playNoise(0.2, false, 0.5); }
            bossWarning() { if (!this.ctx || !this.masterGain) return; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(400, this.ctx.currentTime + 0.5); osc.frequency.linearRampToValueAtTime(200, this.ctx.currentTime + 1); osc.frequency.linearRampToValueAtTime(400, this.ctx.currentTime + 1.5); osc.frequency.linearRampToValueAtTime(200, this.ctx.currentTime + 2); gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.8, this.ctx.currentTime + 0.2); gain.gain.setValueAtTime(0.8, this.ctx.currentTime + 1.8); gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.5); osc.connect(gain); gain.connect(this.masterGain); osc.start(); osc.stop(this.ctx.currentTime + 2.5); }
            uiHover() { this.playTone(800, 'sine', 0.05, undefined, 0.1); }
            uiClick() { this.playTone(1000, 'square', 0.1, 500, 0.3); }
            overdrive() { this.playTone(300, 'sawtooth', 1.0, 1200, 0.6); this.playNoise(1.0, true, 0.8); }
        }

        const sfx = new SFXEngine();

        // Seeded PRNG for deterministic spawning
        function mulberry32(a) {
            return function () {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        const ZONES = [
            { name: "SECTOR CERO", bgGlow: "rgba(14, 165, 233, 0.08)", grid: "rgba(56, 189, 248, 0.04)" },
            { name: "BIO-LABORATORIO", bgGlow: "rgba(16, 185, 129, 0.08)", grid: "rgba(52, 211, 153, 0.04)" },
            { name: "NÚCLEO MAGMÁTICO", bgGlow: "rgba(249, 115, 22, 0.08)", grid: "rgba(251, 146, 60, 0.04)" },
            { name: "ANOMALÍA DEL VACÍO", bgGlow: "rgba(168, 85, 247, 0.08)", grid: "rgba(192, 132, 252, 0.04)" },
        ];
        const distance = (a, b) => Math.hypot(b.x - a.x, b.y - a.y);
        const normalize = (v) => { const mag = Math.hypot(v.x, v.y); return mag === 0 ? { x: 0, y: 0 } : { x: v.x / mag, y: v.y / mag }; };
        const addVectors = (a, b) => ({ x: a.x + b.x, y: a.y + b.y });
        const scaleVector = (v, s) => ({ x: v.x * s, y: v.y * s });

        const UPGRADE_POOL = [
            { id: 'rate1', title: 'Sobrecarga de Núcleo', description: '+25% Cadencia de Fuego', icon: Zap, color: 'text-yellow-400', rarity: 'common', apply: (p) => p.upgrades.fireRateMult *= 0.75 },
            { id: 'speed1', title: 'Servomotores', description: '+15% Velocidad de Movimiento', icon: FastForward, color: 'text-sky-400', rarity: 'common', apply: (p) => p.upgrades.speedMult += 0.15 },
            { id: 'magnet1', title: 'Imán de Datos', description: '+60% Radio de recolección', icon: Magnet, color: 'text-blue-400', rarity: 'common', apply: (p) => p.upgrades.magnetMult += 0.6 },
            { id: 'hp1', title: 'Blindaje Reactivo', description: '+50 Vida Máxima y Curación', icon: Shield, color: 'text-emerald-400', rarity: 'rare', apply: (p) => { p.maxHp += 50; p.hp = Math.min(p.maxHp, p.hp + 70); } },
            { id: 'dmg1', title: 'Munición de Tungsteno', description: '+30% Daño Base', icon: Swords, color: 'text-red-400', rarity: 'rare', apply: (p) => p.upgrades.damageMult += 0.3 },
            { id: 'heavy1', title: 'Calibre Pesado', description: '+60% Daño, -15% Cadencia', icon: Target, color: 'text-orange-400', rarity: 'rare', apply: (p) => { p.upgrades.damageMult += 0.6; p.upgrades.fireRateMult *= 1.15; } },
            { id: 'regen1', title: 'Nanobots Reparadores', description: 'Regenera vida pasivamente (0.1/tick)', icon: HeartPulse, color: 'text-green-400', rarity: 'rare', apply: (p) => p.upgrades.regenRate += 0.1 },
            { id: 'dash1', title: 'Propulsores de Fase', description: '-30% Tiempo recarga del Dash', icon: Wind, color: 'text-teal-400', rarity: 'rare', apply: (p) => p.upgrades.dashCooldownMax *= 0.7 },
            { id: 'crit1', title: 'Lentes Ópticos', description: '+20% Probabilidad de Crítico', icon: Aperture, color: 'text-yellow-500', rarity: 'epic', apply: (p) => p.upgrades.critChance += 0.2 },
            { id: 'pierce1', title: 'Proyectiles Perforantes', description: 'Las balas atraviesan 1 enemigo extra', icon: Crosshair, color: 'text-purple-400', rarity: 'epic', apply: (p) => p.upgrades.pierce += 1 },
            { id: 'vamp1', title: 'Sifón de Alma', description: '15% de probabilidad de curarte al matar', icon: Droplets, color: 'text-rose-400', rarity: 'epic', apply: (p) => p.upgrades.vampirism += 0.15 },
            { id: 'orbit1', title: 'Dron Centinela', description: 'Añade un dron orbital defensivo', icon: Disc, color: 'text-indigo-400', rarity: 'epic', apply: (p) => p.upgrades.orbitals += 1 },
            { id: 'bounce1', title: 'Óptica de Rebote', description: 'Tus proyectiles rebotan en los muros', icon: RotateCcw, color: 'text-cyan-400', rarity: 'epic', apply: (p) => p.upgrades.bounces += 1 },
            { id: 'ult1', title: 'Condensador de Plasma', description: '+60% Recarga de Sobrecarga', icon: Zap, color: 'text-fuchsia-400', rarity: 'epic', apply: (p) => p.upgrades.ultChargeRate += 0.6 },

            // UNIQUE / ONE-TIME UPGRADES
            { id: 'multi1', title: 'Módulo de Dispersión', description: 'Disparo Triple (Abanico)', icon: Activity, color: 'text-pink-400', rarity: 'legendary', unique: true, apply: (p) => p.upgrades.multiShot = 2 },
            { id: 'multi2', title: 'Matriz Cuádruple', description: 'Disparo Cuádruple (X-Pattern)', icon: Activity, color: 'text-pink-600', rarity: 'legendary', unique: true, condition: (p) => p.upgrades.multiShot === 2, apply: (p) => p.upgrades.multiShot = 3 },
            { id: 'boom1', title: 'Munición Explosiva', description: 'Tus proyectiles detonan al impactar', icon: Flame, color: 'text-orange-500', rarity: 'legendary', unique: true, apply: (p) => p.upgrades.explosionRadius = 60 },
            { id: 'frag1', title: 'Balas de Fragmentación', description: 'Las balas se dividen en 2 al matar', icon: Scissors, color: 'text-red-500', rarity: 'legendary', unique: true, apply: (p) => p.upgrades.fragOnKill = true },
            { id: 'slow1', title: 'Pulso Criogénico', description: 'Los críticos ralentizan al enemigo', icon: Snowflake, color: 'text-blue-300', rarity: 'epic', unique: true, apply: (p) => p.upgrades.slowOnCrit = true },

            // NEW SPECIAL UPGRADES
            { id: 'emergency1', title: 'Protocolo de Emergencia', description: '+100% Daño cuando tienes <30 HP', icon: AlertTriangle, color: 'text-red-600', rarity: 'rare', unique: true, apply: (p) => p.upgrades.emergencyBuff = true },
            { id: 'sync1', title: 'Enlace Neuronal', description: '+3% Daño por cada mejora obtenida', icon: Cpu, color: 'text-lime-400', rarity: 'epic', unique: true, apply: (p) => p.upgrades.neuralSync = true },
            { id: 'shield_fara', title: 'Escudo de Faraday', description: '-3 Daño recibido de todas las fuentes', icon: ShieldAlert, color: 'text-blue-500', rarity: 'rare', apply: (p) => p.upgrades.flatArmor += 3 },
            { id: 'chrono1', title: 'Crono-Drive', description: 'Dash ralentiza el tiempo 2s', icon: Timer, color: 'text-indigo-300', rarity: 'legendary', unique: true, apply: (p) => p.upgrades.timeSlowDash = true },
            { id: 'ghost1', title: 'Imagen Residual', description: 'El Dash deja un señuelo explosivo', icon: Ghost, color: 'text-purple-300', rarity: 'epic', unique: true, apply: (p) => p.upgrades.dashDecoy = true },
            { id: 'overclock1', title: 'Overclock Sistema', description: '+40% Atrib. Globales durante Overdrive', icon: Gauge, color: 'text-fuchsia-600', rarity: 'legendary', unique: true, apply: (p) => p.upgrades.overdriveBoost = true },
            { id: 'viral1', title: 'Infección Viral', description: 'Los enemigos derrotados dañan cercanos', icon: Bug, color: 'text-green-600', rarity: 'rare', apply: (p) => p.upgrades.deathNova += 1 },
            { id: 'chain1', title: 'Rayo en Cadena', description: 'Disparos tienen chance de encadenar', icon: CloudLightning, color: 'text-yellow-300', rarity: 'epic', apply: (p) => p.upgrades.chainLightning += 0.1 }
        ];

        function App() {
            const canvasRef = useRef(null);
            const menuRef = useRef(null);
            const hudRef = useRef(null);
            const gameOverRef = useRef(null);
            const upgradeMenuRef = useRef(null);

            const [gameState, setGameState] = useState('menu');
            const [gsapReady, setGsapReady] = useState(false);
            const [score, setScore] = useState(0);
            const [wave, setWave] = useState(1);
            const [playerLevel, setPlayerLevel] = useState(1);
            const [aiStrategy, setAiStrategy] = useState("Iniciando Análisis...");
            const [playerStats, setPlayerStats] = useState({ aggressiveness: 0.5, mobility: 0.5 });
            const [screenFlash, setScreenFlash] = useState(false);
            const [currentUpgrades, setCurrentUpgrades] = useState([]);
            const [acquiredUpgrades, setAcquiredUpgrades] = useState([]);
            const [bossWarning, setBossWarning] = useState(false);

            // COOP STATE
            const [roomCode, setRoomCode] = useState('');
            const [isHost, setIsHost] = useState(false);
            const [sessionData, setSessionData] = useState(null);

            // MULTIPLAYER STATE
            const [user, setUser] = useState(null);
            const [leaderboard, setLeaderboard] = useState([]);
            const [activePlayersCount, setActivePlayersCount] = useState(0);

            // FIREBASE INSTANCES
            const fbApp = useRef(null);
            const fbAuth = useRef(null);
            const fbDb = useRef(null);

            // FIREBASE SYNC: Save high scores on Game Over
            useEffect(() => {
                if (gameState === 'gameover' && score > 0) {
                    console.log(`[Anomalía] Mission Terminated. Final Score: ${score}. Syncing...`);
                    try {
                        if (window.parent && window.parent.saveArcadeScore) {
                            window.parent.saveArcadeScore('anomalia', score);
                        }
                    } catch (e) { }
                }
            }, [gameState]);

            // FIREBASE SYNC: Save high scores on Game Over
            useEffect(() => {
                if (gameState === 'gameover' && score > 0) {
                    console.log(`[Anomalía] Mission Terminated. Final Score: ${score}. Syncing...`);
                    try {
                        if (window.parent && window.parent.saveArcadeScore) {
                            window.parent.saveArcadeScore('anomalia', score);
                        }
                    } catch (e) { }
                }
            }, [gameState]);

            const handleExit = () => {
                console.log("Exiting game...");
                try {
                    window.parent.postMessage({ type: 'exit_game' }, '*');
                } catch (e) { }
                window.location.href = '/index.html';
            };

            const game = useRef({
                player: {
                    pos: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
                    vel: { x: 0, y: 0 },
                    radius: 15, hp: 100, maxHp: 100, speed: 5.5,
                    lastShot: 0, rotation: 0,
                    xp: 0, maxXp: 100, level: 1, dashTime: 0, dashCooldown: 0, isDashing: false, ultCharge: 0,
                    isOverdrive: false, overdriveTime: 0,
                    upgrades: { fireRateMult: 1, speedMult: 1, damageMult: 1, pierce: 0, multiShot: 1, magnetMult: 1, regenRate: 0, vampirism: 0, explosionRadius: 0, critChance: 0.1, critMult: 2.2, orbitals: 0, dashCooldownMax: 90, bounces: 0, ultChargeRate: 1, fragOnKill: false, slowOnCrit: false, emergencyBuff: false, neuralSync: false, flatArmor: 0, timeSlowDash: false, dashDecoy: false, overdriveBoost: false, deathNova: 0, chainLightning: 0 }
                },
                enemies: [], bullets: [], particles: [], floatingTexts: [], keys: {},
                mousePos: { x: window.innerWidth / 2, y: window.innerHeight / 2 },
                isMouseDown: false, isRightMouseDown: false,
                shootBuffer: 0, overdriveBuffer: 0,
                score: 0, wave: 1, frameCount: 0, lastFrameTime: 0, cameraShake: 0, bossActive: false,
                lastBossWave: 0, currentZone: 0, otherPlayers: {},
                prng: mulberry32(0),
                ai: {
                    metrics: { distToEnemies: [], playerVelocities: [] },
                    profile: { aggressiveness: 0.5, mobility: 0.5, evasionBiasX: 0, evasionBiasY: 0, sessions: 1 },
                    currentStrategy: 'Patrones Estándar', nextAdaptation: 300,
                    enemySpawnWeights: { chaser: 50, kiter: 20, interceptor: 20, bomber: 10 }
                }
            });

            useEffect(() => {
                if (window.gsap) setGsapReady(true);

                // Initialize Firebase inside the component to ensure module order
                try {
                    fbApp.current = initializeApp(FIREBASE_CONFIG);
                    fbAuth.current = getAuth(fbApp.current);
                    fbDb.current = getFirestore(fbApp.current);

                    const initAuth = async () => {
                        try {
                            if (AUTH_TOKEN) await signInWithCustomToken(fbAuth.current, AUTH_TOKEN);
                            else await signInAnonymously(fbAuth.current);
                        } catch (e) { console.error("Auth failed", e); }
                    };
                    initAuth();
                    const unsub = onAuthStateChanged(fbAuth.current, setUser);
                    return () => unsub();
                } catch (e) {
                    console.error("Firebase Initialization Error", e);
                }
            }, []);

            useEffect(() => {
                if (!user || !fbDb.current) return;

                // Load cloud-persisted AI Profile
                const profileRef = doc(fbDb.current, 'anomalia_stats', user.uid);
                getDoc(profileRef).then(snap => {
                    if (snap.exists()) {
                        const cloudProfile = snap.data();
                        game.current.ai.profile = { ...cloudProfile, sessions: (cloudProfile.sessions || 0) + 1 };
                        setPlayerStats(game.current.ai.profile);
                        // Also update local storage for redundancy
                        localStorage.setItem('adaptiveAI_profile_v6', JSON.stringify(game.current.ai.profile));
                    }
                }).catch(e => console.error("Error loading cloud profile:", e));

                const lbRef = collection(fbDb.current, 'anomalia_leaderboard');
                const unsubLb = onSnapshot(lbRef, (snap) => {
                    const data = []; snap.forEach(doc => data.push(doc.data()));
                    data.sort((a, b) => b.score - a.score); setLeaderboard(data.slice(0, 5));
                });
                const playersRef = collection(fbDb.current, 'anomalia_players');
                const unsubPlayers = onSnapshot(playersRef, (snap) => {
                    const others = {}; const now = Date.now(); let count = 0;
                    snap.forEach(doc => { const d = doc.data(); if (now - d.timestamp < 5000) { count++; if (doc.id !== user.uid) others[doc.id] = d; } });
                    setActivePlayersCount(count); game.current.otherPlayers = others;
                });
                return () => { unsubLb(); unsubPlayers(); };
            }, [user]);

            const addFloatingText = (x, y, text, color, size = 16, isCrit = false) => {
                const ft = { id: Math.random(), pos: { x, y }, vel: { x: 0, y: 0 }, text, color, life: 0, maxLife: isCrit ? 80 : 60, alpha: 1, size, isCrit };
                game.current.floatingTexts.push(ft);
                if (window.gsap) {
                    window.gsap.to(ft.pos, { y: y - (isCrit ? 80 : 50) - Math.random() * 20, x: x + (Math.random() - 0.5) * (isCrit ? 50 : 30), duration: isCrit ? 1.5 : 1.2, ease: 'power3.out' });
                    window.gsap.to(ft, {
                        alpha: 0, duration: 0.8, delay: isCrit ? 0.6 : 0.4, onComplete: () => {
                            const idx = game.current.floatingTexts.findIndex(t => t.id === ft.id);
                            if (idx > -1) game.current.floatingTexts.splice(idx, 1);
                        }
                    });
                }
            };

            const createExplosion = (x, y, color, count = 10, size = 3, radius = 0, velOverride = null) => {
                sfx.explosion(count);
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * (radius > 0 ? 8 : 4) + 1;
                    const vel = velOverride ? { x: velOverride.x * 0.2 + (Math.random() - 0.5) * 2, y: velOverride.y * 0.2 + (Math.random() - 0.5) * 2 } : { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed };
                    game.current.particles.push({ pos: { x, y }, vel, life: 0, maxLife: Math.random() * 30 + 20, color, size: Math.random() * size + 1, friction: 0.96, type: 'spark' });
                }
                if (radius > 0) {
                    game.current.particles.push({ pos: { x, y }, vel: { x: 0, y: 0 }, life: 0, maxLife: 20, color, size: radius, friction: 1, type: 'ring' });
                }

                                                <div className="text-sm font-black uppercase tracking-widest text-white">Anfitrión Local</div>
                                            </div>
                                            <div className="text-[10px] font-black text-sky-400 bg-sky-400/10 px-3 py-1 rounded-full border border-sky-400/20 uppercase">Online</div>
                                        </div>

                                        {Object.entries(game.current.otherPlayers).map(([id, p]) => (
                                            <div key={id} className="flex items-center justify-between bg-emerald-500/5 p-5 rounded-2xl border border-emerald-500/20 animate-in slide-in-from-bottom-2 duration-300">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-10 h-10 bg-emerald-400/20 rounded-xl flex items-center justify-center text-emerald-400 border border-emerald-400/30">
                                                        <Activity size={20} />
                                                    </div>
                                                    <div className="text-sm font-black uppercase tracking-widest text-white">Unidad {id.slice(0, 4)}</div>
                                                </div>
                                                <div className="text-[10px] font-black text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded-full border border-emerald-400/20 uppercase">Vinculado</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {isHost ? (
                                        <button
                                            onClick={startMission}
                                            className="group relative w-full py-6 bg-emerald-500 hover:bg-emerald-400 rounded-3xl font-black text-2xl uppercase tracking-[0.3rem] transition-all overflow-hidden shadow-[0_0_40px_#10b98144]"
                                        >
                                            <span className="relative z-10 flex items-center justify-center gap-4 text-slate-900">
                                                <Zap size={24} fill="currentColor" /> Iniciar Misión
                                            </span>
                                            <div className="absolute inset-0 bg-white/20 transform -translate-x-full group-hover:translate-x-full transition-transform duration-700 skew-x-12"></div>
                                        </button>
                                    ) : (
                                        <div className="w-full py-6 bg-slate-800/10 border border-slate-700/50 rounded-3xl text-slate-400 font-extrabold uppercase tracking-widest flex items-center justify-center gap-4">
                                            <div className="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></div>
                                            Esperando al Anfitrión...
                                        </div>
                                    )}
                                    <button onClick={handleExit} className="w-full py-2 text-slate-600 hover:text-slate-400 uppercase font-black tracking-widest text-[10px] transition-colors">Abortar Vínculo</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {gameState === 'upgrading' && (
                        <div className="absolute inset-0 flex items-center justify-center bg-[#050814]/95 backdrop-blur-md z-50">
                            <div ref={upgradeMenuRef} className="text-center max-w-6xl px-10 w-full animate-in fade-in zoom-in duration-500">
                                <div className="flex items-center justify-center gap-4 mb-2">
                                    <BrainCircuit size={32} className="text-sky-400" />
                                    <h2 className="text-6xl font-black uppercase tracking-tighter italic">Software Upgrade</h2>
                                </div>
                                <p className="text-slate-500 mb-16 uppercase tracking-[0.5rem] text-xs">Adaptation cycle complete. Select system modification.</p>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {currentUpgrades.map((u, i) => (
                                        <button
                                            key={u.id}
                                            onClick={() => selectUpgrade(u)}
                                            className="group relative bg-slate-900/60 p-10 rounded-[3rem] border border-slate-800 hover:border-sky-400 transition-all text-left overflow-hidden hover:scale-105 active:scale-95 shadow-xl"
                                        >
                                            <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-20 transition-opacity">
                                                <u.icon size={120} />
                                            </div>
                                            <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-12 shadow-lg ${u.color.replace('text-', 'bg-')}/20 ${u.color}`}>
                                                <u.icon size={36} />
                                            </div>
                                            <div className="font-black text-2xl uppercase mb-3 leading-none italic">{u.title}</div>
                                            <div className="text-sm text-slate-400 leading-relaxed font-medium mb-6">{u.description}</div>
                                            <div className="pt-6 border-t border-slate-800/50 flex justify-between items-center group-hover:border-sky-400/50">
                                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-500 group-hover:text-sky-400 transition-colors">Apply Component</span>
                                                <ArrowUpCircle size={20} className="text-slate-700 group-hover:text-sky-400 transition-colors" />
                                            </div>
                                            <div className="absolute bottom-0 left-0 w-full h-1 bg-sky-500 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {gameState === 'gameover' && (
                        <div className="absolute inset-0 flex items-center justify-center bg-red-950/80 backdrop-blur-3xl z-50">
                            <div ref={gameOverRef} className="bg-black p-20 rounded-[4rem] border border-red-500/50 shadow-[0_0_100px_rgba(239,68,68,0.2)] text-center max-w-lg relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-red-500"></div>
                                <AlertTriangle size={80} className="text-red-500 mx-auto mb-10 animate-pulse" />
                                <h2 className="text-5xl font-black mb-4 uppercase tracking-tighter italic">Critical Error</h2>
                                <p className="text-red-500/60 text-xs font-mono uppercase tracking-[0.3rem] mb-12">Neural Integrity Terminated</p>

                                <div className="mb-14">
                                    <div className="text-7xl font-black text-white leading-none mb-2 drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">{score.toLocaleString()}</div>
                                    <div className="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Final Network Score</div>
                                </div>

                                <div className="space-y-4 pointer-events-auto">
                                    <button onClick={startGame} className="w-full py-5 bg-red-600 hover:bg-red-500 rounded-3xl font-black text-xl uppercase tracking-widest transition-all shadow-[0_0_30px_#ef444433]">Reboot System</button>
                                    <button onClick={handleExit} className="w-full py-4 text-slate-500 hover:text-white uppercase font-black tracking-widest text-xs transition-colors hover:bg-white/5 rounded-2xl">Eject Capsule</button>
                                </div>

                                <div className="mt-12 flex justify-center gap-4 overflow-hidden">
                                    {[...Array(12)].map((_, i) => (
                                        <div key={i} className="w-1 h-3 bg-red-500/20 rounded-full animate-pulse" style={{ animationDelay: `${i * 0.1}s` }}></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
