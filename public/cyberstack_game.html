<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Stack - MicroApp</title>
    <script>
        // Silencio Total de Avisos antes de que carguen las librerías
        tailwind = { config: { theme: { extend: {} } } }; 
        window.process = { env: { NODE_ENV: 'production' } };
        console.info = (function(oldInfo) {
            return function(msg) {
                if (typeof msg === 'string' && (msg.includes('in-browser Babel transformer') || msg.includes('tailwindcss.com'))) return;
                oldInfo.apply(console, arguments);
            };
        })(console.info || function(){});
        console.warn = (function(oldWarn) {
            return function(msg) {
                if (typeof msg === 'string' && (msg.includes('tailwindcss.com') || msg.includes('production'))) return;
                oldWarn.apply(console, arguments);
            };
        })(console.warn || function(){});
    </script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background: #020617; overflow: hidden; }
        #root { width: 100vw; height: 100vh; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18?dev",
        "react-dom": "https://esm.sh/react-dom@18/client?dev",
        "react-dom/client": "https://esm.sh/react-dom@18/client?dev"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useCallback } from 'react';
        import ReactDOM from 'react-dom/client';
        import { Trophy, Play, RotateCcw, Volume2, VolumeX, Sparkles, Users, Crown, Skull, ArrowDown, Zap } from 'https://esm.sh/lucide-react?external=react,react-dom';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Hacer React disponible globalmente para Babel y Lucide
        window.React = React;
        window.ReactDOM = ReactDOM;

        // ============================================================================
        // CONFIGURACIÓN DE FIREBASE (Puente con plataforma)
        // ============================================================================
        const urlParams = new URLSearchParams(window.location.search);
        const configParam = urlParams.get('config');
        const appIdParam = urlParams.get('appId');
        const initialAuthToken = urlParams.get('token');

        const firebaseConfig = configParam ? JSON.parse(decodeURIComponent(configParam)) : (typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {});
        const app = Object.keys(firebaseConfig).length > 0 ? initializeApp(firebaseConfig) : null;
        const auth = app ? getAuth(app) : null;
        const db = app ? getFirestore(app) : null;
        const appId = appIdParam || (typeof __app_id !== 'undefined' ? __app_id : 'stack-game-default');

        // ============================================================================
        // MOTOR DE AUDIO (Web Audio API)
        // ============================================================================
        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.muted = false;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            playTone(freq, type = 'sine', duration = 0.1, vol = 0.1) {
                if (this.muted || !this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch (e) {
                    console.warn("Audio error", e);
                }
            }

            playPerfect(combo) {
                this.init();
                const baseFreq = 440;
                const note = baseFreq * Math.pow(1.059463094359, combo * 2);
                this.playTone(note, 'sine', 0.3, 0.15);
                this.playTone(note * 1.5, 'triangle', 0.2, 0.1);
            }

            playChop() {
                this.init();
                this.playTone(150, 'square', 0.1, 0.05);
            }

            playGameOver() {
                this.init();
                if (this.muted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 1);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 1);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 1);
            }

            playSabotage() {
                this.init();
                if (this.muted || !this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.6);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.6);
            }
        }

        const audio = new AudioEngine();

        // ============================================================================
        // CONSTANTES DEL JUEGO Y FÍSICAS
        // ============================================================================
        const BASE_SIZE = 120;
        const PERFECT_TOLERANCE = 5;
        const ISO_ANGLE = Math.PI / 6;
        const COS_ISO = Math.cos(ISO_ANGLE);
        const SIN_ISO = Math.sin(ISO_ANGLE);
        const DROP_HEIGHT = 150;
        const PENDULUM_L = 250;
        const MAX_LEVEL_DIFF = 10;
        const SABOTAGES = ['WIND', 'SPEED', 'SHRINK'];
        const hslToObj = (h, s, l) => ({ h, s, l });
        const getBlockHeight = (mode) => mode.includes('GRAVITY') ? 35 : 15;

        // ============================================================================
        // FÍSICAS DE ESTABILIDAD
        // ============================================================================
        const checkStability = (blocks) => {
            let comX = 0; let comZ = 0; let totalArea = 0;
            let maxRx = 0; let maxRz = 0; let worstIndex = -1; let fallingIndex = -1;

            for (let i = blocks.length - 1; i > 0; i--) {
                const block = blocks[i];
                const area = block.w * block.d;
                comX = (comX * totalArea + block.x * area) / (totalArea + area);
                comZ = (comZ * totalArea + block.z * area) / (totalArea + area);
                totalArea += area;

                const support = blocks[i - 1];
                const dx = comX - support.x;
                const dz = comZ - support.z;
                const rx = dx / (support.w / 2);
                const rz = dz / (support.d / 2);

                if (Math.abs(rx) > 1 || Math.abs(rz) > 1) {
                    if (fallingIndex === -1) fallingIndex = i;
                }

                const maxRatioAtJoint = Math.max(Math.abs(rx), Math.abs(rz));
                const currentMaxRatio = Math.max(Math.abs(maxRx), Math.abs(maxRz));
                if (maxRatioAtJoint > currentMaxRatio) {
                    maxRx = rx; maxRz = rz; worstIndex = i;
                }
            }
            return { falling: fallingIndex !== -1, index: fallingIndex !== -1 ? fallingIndex : worstIndex, rx: maxRx, rz: maxRz };
        };

        // ============================================================================
        // COMPONENTE PRINCIPAL
        // ============================================================================
        function App() {
            const [appState, setAppState] = useState('MENU');
            const [gameMode, setGameMode] = useState('SINGLE');
            const [scores, setScores] = useState([0, 0]);
            const [combos, setCombos] = useState([0, 0]);
            const [playerStates, setPlayerStates] = useState(['playing', 'playing']);
            const [activeSabotages, setActiveSabotages] = useState([null, null]);

            const [isMuted, setIsMuted] = useState(false);
            const [highScore, setHighScore] = useState(0);
            const [user, setUser] = useState(null);
            const [leaderboard, setLeaderboard] = useState([]);
            const [isNewRecord, setIsNewRecord] = useState(false);

            const canvasRef = useRef(null);
            const gameRef = useRef({
                mode: 'SINGLE',
                players: [],
                bgParticles: [],
                time: 0,
                lastFrame: 0,
                animFrame: null
            });

            // FIREBASE INIT
            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (initialAuthToken) {
                            await signInWithCustomToken(auth, initialAuthToken);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) { console.error("Auth error:", error); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const fetchPersonalScore = async () => {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'users', user.uid, 'stats', 'highscore');
                        const docSnap = await getDoc(docRef);
                        if (docSnap.exists()) setHighScore(docSnap.data().score || 0);
                    } catch (e) { console.error("Error score", e); }
                };
                fetchPersonalScore();

                const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                const unsubscribe = onSnapshot(leaderboardRef, (snapshot) => {
                    const s = [];
                    snapshot.forEach((d) => s.push({ id: d.id, ...d.data() }));
                    s.sort((a, b) => b.score - a.score);
                    setLeaderboard(s.slice(0, 5));
                }, (error) => console.error("Error leaderboard", error));

                return () => unsubscribe();
            }, [user]);

            const saveScoreSingle = useCallback(async (finalScore) => {
                if (!user || !db || finalScore <= 0 || gameMode.includes('LOCAL_MULTI')) return;
                
                // NOTIFICAR AL PADRE (Plataforma)
                window.parent.postMessage({ type: 'SAVE_SCORE', score: finalScore }, '*');

                try {
                    if (finalScore > highScore) {
                        setHighScore(finalScore);
                        setIsNewRecord(true);
                        const personalRef = doc(db, 'artifacts', appId, 'users', user.uid, 'stats', 'highscore');
                        await setDoc(personalRef, { score: finalScore, date: new Date().toISOString() });
                        const publicRef = doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid);
                        await setDoc(publicRef, { score: finalScore, uid: user.uid, date: new Date().toISOString() });
                    }
                } catch (e) { console.error("Save error", e); }
            }, [user, db, gameMode, highScore]);

            const createPlayerState = (hueOffset, mode) => {
                const baseHue = (Math.floor(Math.random() * 360) + hueOffset) % 360;
                const h = getBlockHeight(mode);
                return {
                    blocks: [{ x: 0, y: 0, targetY: 0, z: 0, w: BASE_SIZE, h: h, d: BASE_SIZE, color: hslToObj(baseHue, 70, 50) }],
                    fallingBlocks: [],
                    particles: [],
                    level: 0,
                    movementTime: 0,
                    sabotage: { type: null, timer: 0 },
                    baseHue: baseHue,
                    speed: 120,
                    shake: 0,
                    state: 'playing',
                    showPerfect: false
                };
            };

            const spawnBlock = useCallback((pIdx) => {
                const p = gameRef.current.players[pIdx];
                const mode = gameRef.current.mode;
                const prev = p.blocks[p.blocks.length - 1];
                const isX = p.level % 2 === 0;

                p.speed = Math.min(350, 120 + p.level * 8);
                p.level++;

                const newColor = hslToObj((p.baseHue + p.level * 8) % 360, 70, 55);
                const startRange = 200;
                const h = getBlockHeight(mode);
                const targetY = prev.targetY !== undefined ? prev.targetY + prev.h : prev.y + prev.h;
                const startY = mode.includes('GRAVITY') ? targetY + DROP_HEIGHT : targetY;

                p.blocks.push({
                    x: isX ? -startRange : prev.x,
                    y: startY,
                    targetY: targetY,
                    z: isX ? prev.z : -startRange,
                    w: prev.w, h: h, d: prev.d,
                    color: newColor,
                    isMoving: true, isDropping: false,
                    vy: 0, vx: 0, vz: 0
                });
            }, []);

            const initGame = useCallback((mode) => {
                gameRef.current.mode = mode;
                gameRef.current.players = mode.includes('LOCAL_MULTI')
                    ? [createPlayerState(0, mode), createPlayerState(180, mode)]
                    : [createPlayerState(0, mode)];

                gameRef.current.time = 0;
                gameRef.current.lastFrame = performance.now();
                gameRef.current.bgParticles = Array.from({ length: 60 }, () => ({
                    x: Math.random(), y: Math.random(),
                    size: Math.random() * 2 + 0.5,
                    speedY: Math.random() * 0.05 + 0.02,
                    hue: Math.random() > 0.5 ? 200 : 280,
                    opacity: Math.random() * 0.5 + 0.2
                }));

                setScores(mode.includes('LOCAL_MULTI') ? [0, 0] : [0]);
                setCombos(mode.includes('LOCAL_MULTI') ? [0, 0] : [0]);
                setPlayerStates(mode.includes('LOCAL_MULTI') ? ['playing', 'playing'] : ['playing']);
                setActiveSabotages([null, null]);
                setIsNewRecord(false);

                gameRef.current.players.forEach((_, idx) => spawnBlock(idx));
            }, [spawnBlock]);

            const startGame = (mode) => {
                audio.init();
                setGameMode(mode);
                setAppState('PLAYING');
                initGame(mode);
            };

            const createParticles = (pIdx, x, y, z, w, d, color) => {
                const p = gameRef.current.players[pIdx];
                for (let i = 0; i < 15; i++) {
                    p.particles.push({
                        x: x + (Math.random() - 0.5) * w, y: y, z: z + (Math.random() - 0.5) * d,
                        vx: (Math.random() - 0.5) * 5, vy: Math.random() * 5 + 2, vz: (Math.random() - 0.5) * 5,
                        life: 1.0, color: color, type: 'normal'
                    });
                }
            };

            const processPlacement = useCallback((pIdx) => {
                const p = gameRef.current.players[pIdx];
                if (!p || p.state !== 'playing') return;

                const curr = p.blocks[p.blocks.length - 1];
                const prev = p.blocks[p.blocks.length - 2];
                curr.isMoving = false; curr.isDropping = false;

                const isX = (p.level - 1) % 2 === 0;
                const delta = isX ? curr.x - prev.x : curr.z - prev.z;
                let isPerfect = false;

                if (Math.abs(delta) <= PERFECT_TOLERANCE) {
                    isPerfect = true; if (isX) curr.x = prev.x; else curr.z = prev.z;
                    setCombos(prevCombos => {
                        const newCombos = [...prevCombos];
                        newCombos[pIdx] += 1;
                        audio.playPerfect(newCombos[pIdx]);
                        // Eliminado el crecimiento de la pieza propia por pedido del usuario
                        return newCombos;
                    });
                    createParticles(pIdx, curr.x, curr.y, curr.z, curr.w, curr.d, curr.color);
                    p.showPerfect = true;
                    setTimeout(() => { if (gameRef.current.players[pIdx]) gameRef.current.players[pIdx].showPerfect = false; }, 500);
                    if (navigator.vibrate) navigator.vibrate(50);

                    if (gameMode.includes('LOCAL_MULTI')) {
                        const oppIdx = pIdx === 0 ? 1 : 0;
                        const oppP = gameRef.current.players[oppIdx];
                        if (oppP && oppP.state === 'playing') {
                            // Reducimos la probabilidad de encoger al rival (SHRINK) porque es una ventaja muy fuerte.
                            // Si es perfecto, solo hay un 20% de probabilidad de SHRINK. Si no, se elige otro sabotaje aleatorio o no pasa nada.
                            let chosenSabotage = null;
                            if (isPerfect) {
                                if (Math.random() < 0.20) {
                                    chosenSabotage = 'SHRINK';
                                } else {
                                    // Si no es shrink, elegimos entre los otros sabotajes menos agresivos
                                    const others = SABOTAGES.filter(s => s !== 'SHRINK');
                                    chosenSabotage = others[Math.floor(Math.random() * others.length)];
                                }
                            } else if (Math.random() < 0.10) { 
                                // En jugadas normales, hay una probabilidad muy baja de activar cualquier sabotaje
                                chosenSabotage = SABOTAGES[Math.floor(Math.random() * SABOTAGES.length)];
                            }

                            if (chosenSabotage) {
                                audio.playSabotage();
                                const duration = chosenSabotage === 'SHRINK' ? 1 : 7;
                                oppP.sabotage = { type: chosenSabotage, timer: duration };
                                if (chosenSabotage === 'SHRINK') {
                                    // Reducir pieza del oponente
                                    const oppCurr = oppP.blocks[oppP.blocks.length - 1];
                                    if (oppCurr && oppCurr.isMoving) {
                                        oppCurr.w = Math.max(BASE_SIZE * 0.4, oppCurr.w * 0.75);
                                        oppCurr.d = Math.max(BASE_SIZE * 0.4, oppCurr.d * 0.75);
                                    }
                                }
                                setActiveSabotages(prev => { const next = [...prev]; next[oppIdx] = chosenSabotage; return next; });
                                setTimeout(() => {
                                    setActiveSabotages(prev => { const next = [...prev]; if (next[oppIdx] === chosenSabotage) next[oppIdx] = null; return next; });
                                }, 7000);
                            }
                        }
                    }
                } else {
                    setCombos(prevC => { const n = [...prevC]; n[pIdx] = 0; return n; });
                    audio.playChop();
                    p.shake = Math.abs(delta) * 0.1;
                }

                const stability = checkStability(p.blocks);
                const fallIndex = stability.falling ? stability.index : -1;
                let pIdxDied = false;

                if (fallIndex !== -1) {
                    const support = p.blocks[fallIndex - 1] || p.blocks[0];
                    const falling = p.blocks.splice(fallIndex);
                    falling.forEach(b => {
                        b.vy = Math.random() * 200 + 50;
                        b.vx = (b.x - support.x) * 2 + (Math.random() - 0.5) * 100;
                        b.vz = (b.z - support.z) * 2 + (Math.random() - 0.5) * 100;
                        b.alpha = 1;
                        p.fallingBlocks.push(b);
                    });
                    p.state = 'dead'; pIdxDied = true;
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    audio.playGameOver();
                    if (!gameMode.includes('LOCAL_MULTI')) {
                        saveScoreSingle(p.level - falling.length);
                    }
                } else {
                    setScores(prevS => { const n = [...prevS]; n[pIdx] += (isPerfect ? 2 : 1); return n; });
                    spawnBlock(pIdx);
                }

                setPlayerStates(prev => {
                    let next = [...prev]; if (pIdxDied) next[pIdx] = 'dead';
                    if (gameMode.includes('LOCAL_MULTI')) {
                        const maxLevel = Math.max(...gameRef.current.players.map((pl, i) => next[i] === 'playing' ? pl.level : -1));
                        gameRef.current.players.forEach((pl, i) => {
                            if (next[i] === 'playing' && maxLevel - pl.level >= MAX_LEVEL_DIFF) {
                                next[i] = 'dead'; pl.state = 'dead';
                                if (pl.blocks.length > 0) {
                                    const falling = pl.blocks.splice(pl.blocks.length - 1);
                                    falling.forEach(b => {
                                        b.vy = Math.random() * 100 + 50; b.vx = (Math.random() - 0.5) * 100;
                                        b.vz = (Math.random() - 0.5) * 100; b.alpha = 1; pl.fallingBlocks.push(b);
                                    });
                                }
                                audio.playGameOver();
                            }
                        });
                    }
                    if (next.every(state => state === 'dead')) setAppState('GAMEOVER');
                    return next;
                });
            }, [gameMode, spawnBlock, saveScoreSingle]);

            const processPlacementRef = useRef(processPlacement);
            useEffect(() => { processPlacementRef.current = processPlacement; }, [processPlacement]);

            const handlePlayerInteraction = useCallback((pIdx) => {
                if (appState !== 'PLAYING') return;
                const p = gameRef.current.players[pIdx];
                if (!p || p.state !== 'playing') return;
                const curr = p.blocks[p.blocks.length - 1];
                if (!curr.isMoving) return;
                curr.isMoving = false;
                if (gameMode.includes('GRAVITY')) {
                    curr.isDropping = true; curr.vy = 0;
                } else {
                    processPlacement(pIdx);
                }
            }, [appState, gameMode, processPlacement]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (appState !== 'PLAYING') return;
                    if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'KeyA') handlePlayerInteraction(0);
                    if (gameMode.includes('LOCAL_MULTI') && (e.code === 'Enter' || e.code === 'ArrowUp' || e.code === 'KeyL'))
                        handlePlayerInteraction(1);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [appState, gameMode, handlePlayerInteraction]);

            const handleGlobalPointerDown = (e) => {
                if (e.target.closest('button') || appState === 'MENU' || appState === 'GAMEOVER') return;
                if (!gameMode.includes('LOCAL_MULTI')) handlePlayerInteraction(0);
                else handlePlayerInteraction(e.clientX < window.innerWidth / 2 ? 0 : 1);
            };

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d', { alpha: true });

                const render = (timeNow) => {
                    gameRef.current.animFrame = requestAnimationFrame(render);
                    const dt = (timeNow - gameRef.current.lastFrame) / 1000;
                    gameRef.current.lastFrame = timeNow;
                    gameRef.current.time += dt;
                    const globalTime = gameRef.current.time;

                    if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                    }

                    const w = canvas.width; const h = canvas.height; const cy = h * 0.85;
                    const isGravity = gameRef.current.mode.includes('GRAVITY');
                    const minPhysicalHeight = isGravity ? 800 : 500;
                    const topPadding = isGravity ? 450 : 200;

                    let maxLevel = 0; let maxTargetY = 0;
                    const alivePlayers = gameRef.current.players.filter(p => p.state === 'playing');
                    const playersToCheck = alivePlayers.length > 0 ? alivePlayers : gameRef.current.players;

                    playersToCheck.forEach(p => {
                        if (p.level > maxLevel) maxLevel = p.level;
                        const lastBlock = p.blocks[p.blocks.length - 1];
                        if (lastBlock && lastBlock.targetY > maxTargetY) maxTargetY = lastBlock.targetY;
                    });

                    const baseZoom = Math.min(w, h) / minPhysicalHeight;
                    const zoomReduction = Math.max(isGravity ? 0.35 : 0.45, 1 - (maxLevel * 0.015));
                    const targetZoom = baseZoom * zoomReduction;

                    if (gameRef.current.currentZoom === undefined) gameRef.current.currentZoom = baseZoom;
                    gameRef.current.currentZoom += (targetZoom - gameRef.current.currentZoom) * 0.05;
                    const zoom = gameRef.current.currentZoom;
                    const targetCameraY = maxTargetY + topPadding - (0.70 * h) / zoom;
                    if (gameRef.current.globalCameraY === undefined) gameRef.current.globalCameraY = targetCameraY;
                    gameRef.current.globalCameraY += (targetCameraY - gameRef.current.globalCameraY) * 0.1;
                    const cameraY = gameRef.current.globalCameraY;

                    ctx.clearRect(0, 0, w, h);

                    gameRef.current.bgParticles.forEach(p => {
                        p.y -= p.speedY * dt * 10;
                        if (p.y < 0) { p.y = 1; p.x = Math.random(); }
                        const px = p.x * w;
                        const py = p.y * h + (cameraY * 0.1);
                        const wrappedY = ((py % h) + h) % h;
                        ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.opacity})`;
                        ctx.beginPath(); ctx.arc(px, wrappedY, p.size, 0, Math.PI * 2); ctx.fill();
                    });

                    if (gameRef.current.players.length === 2) {
                        const divGrad = ctx.createLinearGradient(w / 2, 0, w / 2, h);
                        divGrad.addColorStop(0, 'rgba(255,255,255,0)');
                        divGrad.addColorStop(0.5, 'rgba(255,255,255,0.15)');
                        divGrad.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.strokeStyle = divGrad; ctx.lineWidth = 2;
                        ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke();
                    }

                    gameRef.current.players.forEach((p, idx) => {
                        const cx = gameRef.current.players.length === 1 ? w / 2 : (idx === 0 ? w / 4 : w * 0.75);
                        const isWind = p.sabotage.type === 'WIND' && p.sabotage.timer > 0;
                        const isSpeed = p.sabotage.type === 'SPEED' && p.sabotage.timer > 0;

                        if (p.sabotage.timer > 0) {
                            p.sabotage.timer -= dt;
                            if (p.sabotage.timer <= 0) p.sabotage.type = null;
                        }
                        p.movementTime += dt * (isSpeed ? 2.5 : 1);

                        // Grid Retro-Wave
                        ctx.lineWidth = 1 * zoom;
                        for (let i = -15; i <= 15; i++) {
                            const alpha = Math.max(0, 1 - Math.abs(i) / 12);
                            ctx.strokeStyle = `rgba(99, 102, 241, ${0.15 * alpha})`;
                            ctx.beginPath();
                            const p1 = toScreen(i * 100, 0, -1500, cx, cy, zoom);
                            const p2 = toScreen(i * 100, 0, 1500, cx, cy, zoom);
                            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                        }

                        const instability = checkStability(p.blocks);
                        let leanFactorX = 0; let leanFactorZ = 0; let shakeAmt = 0;
                        const maxR = Math.max(Math.abs(instability.rx), Math.abs(instability.rz));
                        if (maxR > 0.5 && p.state === 'playing') {
                            const intensity = Math.min(1, (maxR - 0.5) * 2);
                            shakeAmt = intensity * 3; leanFactorX = instability.rx * 3; leanFactorZ = instability.rz * 3;
                        }

                        const getBlockVisualOffset = (index) => {
                            if (instability.index !== -1 && index >= instability.index && maxR > 0.5) {
                                return { x: leanFactorX * (index - instability.index + 1), z: leanFactorZ * (index - instability.index + 1) };
                            }
                            return { x: 0, z: 0 };
                        };

                        const finalCy = cy + cameraY * zoom; const finalCx = cx;

                        if (p.state === 'playing' && p.blocks.length > 0) {
                            const curr = p.blocks[p.blocks.length - 1];
                            const prev = p.blocks.length > 1 ? p.blocks[p.blocks.length - 2] : { x: 0, z: 0 };
                            const isX = (p.level - 1) % 2 === 0;

                            if (curr.isMoving) {
                                if (isGravity) {
                                    const theta = Math.sin(p.movementTime * (p.speed / 60)) * 0.8;
                                    const pos = (isX ? prev.x : prev.z) + PENDULUM_L * Math.sin(theta);
                                    if (isX) { curr.x = pos; curr.z = prev.z; } else { curr.z = pos; curr.x = prev.x; }
                                    
                                    // IMPLEMENTACIÓN DEL VIENTO: Oscilación lateral
                                    if (isWind) {
                                        const windOffset = Math.sin(globalTime * 15) * 40;
                                        if (isX) curr.z += windOffset;
                                        else curr.x += windOffset;
                                    }
                                } else {
                                    const range = 180; const period = (range * 2) / p.speed;
                                    const phase = (p.movementTime % period) / period;
                                    let pos = phase < 0.5 ? -range + (phase * 2) * (range * 2) : range - ((phase - 0.5) * 2) * (range * 2);
                                    if (isX) { curr.x = pos; curr.z = prev.z; } else { curr.z = pos; curr.x = prev.x; }

                                    // IMPLEMENTACIÓN DEL VIENTO: Oscilación lateral
                                    if (isWind) {
                                        const windOffset = Math.sin(globalTime * 15) * 40;
                                        if (isX) curr.z += windOffset;
                                        else curr.x += windOffset;
                                    }
                                }
                            } else if (curr.isDropping) {
                                curr.vy -= 1200 * dt; curr.y += curr.vy * dt;
                                if (curr.y <= curr.targetY) {
                                    curr.y = curr.targetY; curr.isDropping = false; processPlacementRef.current(idx);
                                }
                            }

                            if (isGravity && (curr.isMoving || curr.isDropping)) {
                                const pTop = toScreen(curr.x, curr.y + curr.h, curr.z, finalCx, finalCy, zoom);
                                const pPivot = toScreen(isX ? prev.x : curr.x, curr.targetY + DROP_HEIGHT + PENDULUM_L, isX ? curr.z : prev.z, finalCx, finalCy, zoom);
                                ctx.beginPath(); ctx.moveTo(pPivot.x, pPivot.y); ctx.lineTo(pTop.x, pTop.y);
                                ctx.lineWidth = 2 * zoom; ctx.strokeStyle = `rgba(255,255,255,0.3)`; ctx.stroke();
                            }
                        }

                        for (let i = 0; i < p.blocks.length; i++) {
                            const b = p.blocks[i]; const off = getBlockVisualOffset(i);
                            const rb = { ...b, x: b.x + off.x, z: b.z + off.z };
                            if ((b.isMoving || b.isDropping) && b.y > b.targetY) drawIsoShadow(ctx, rb, b.targetY, finalCx, finalCy, zoom);
                            drawIsoBlock(ctx, rb, finalCx, finalCy, zoom, globalTime, (i === p.blocks.length - 2 && p.showPerfect));
                        }

                        p.fallingBlocks.forEach((fb, fbi) => {
                            fb.vy -= 900 * dt; fb.y += fb.vy * dt; fb.x += fb.vx * dt; fb.z += fb.vz * dt; fb.alpha -= dt * 0.5;
                            if (fb.alpha > 0) drawIsoBlock(ctx, fb, finalCx, finalCy, zoom, globalTime, false, fb.alpha);
                        });

                        p.particles.forEach((pt, pti) => {
                            pt.x += pt.vx; pt.y += pt.vy; pt.z += pt.vz; pt.vy -= 15 * dt; pt.life -= dt * 1.5;
                            if (pt.life > 0) {
                                const spt = toScreen(pt.x, pt.y, pt.z, finalCx, finalCy, zoom);
                                ctx.globalAlpha = pt.life; ctx.fillStyle = `hsl(${pt.color.h}, 100%, 70%)`;
                                ctx.beginPath(); ctx.arc(spt.x, spt.y, 3 * zoom * pt.life, 0, Math.PI * 2); ctx.fill();
                            }
                        });
                        ctx.globalAlpha = 1;
                    });
                };
                gameRef.current.animFrame = requestAnimationFrame(render);
                return () => cancelAnimationFrame(gameRef.current.animFrame);
            }, []);

            const toScreen = (x, y, z, cx, cy, zoom) => ({
                x: cx + (x - z) * COS_ISO * zoom,
                y: cy + ((x + z) * SIN_ISO - y) * zoom
            });

            const drawIsoShadow = (ctx, block, targetY, cx, cy, zoom) => {
                const { x, z, w, d } = block; const hw = w / 2; const hd = d / 2;
                const s1 = toScreen(x - hw, targetY, z - hd, cx, cy, zoom);
                const s2 = toScreen(x + hw, targetY, z - hd, cx, cy, zoom);
                const s3 = toScreen(x + hw, targetY, z + hd, cx, cy, zoom);
                const s4 = toScreen(x - hw, targetY, z + hd, cx, cy, zoom);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; ctx.beginPath();
                ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.lineTo(s3.x, s3.y); ctx.lineTo(s4.x, s4.y);
                ctx.closePath(); ctx.fill();
            };

            const drawIsoBlock = (ctx, block, cx, cy, zoom, time, isGlow = false, alpha = 1) => {
                const { x, y, z, w, h, d, color } = block; const hw = w / 2; const hd = d / 2;
                const c1 = toScreen(x - hw, y + h, z - hd, cx, cy, zoom);
                const c2 = toScreen(x + hw, y + h, z - hd, cx, cy, zoom);
                const c3 = toScreen(x + hw, y + h, z + hd, cx, cy, zoom);
                const c4 = toScreen(x - hw, y + h, z + hd, cx, cy, zoom);
                const b2 = toScreen(x + hw, y, z - hd, cx, cy, zoom);
                const b3 = toScreen(x + hw, y, z + hd, cx, cy, zoom);
                const b4 = toScreen(x - hw, y, z + hd, cx, cy, zoom);

                ctx.globalAlpha = alpha; ctx.lineJoin = 'round';
                const hue = color.h; const sat = color.s;

                // Lado Derecho
                ctx.fillStyle = `hsl(${hue}, ${sat}%, 35%)`; ctx.beginPath();
                ctx.moveTo(c2.x, c2.y); ctx.lineTo(b2.x, b2.y); ctx.lineTo(b3.x, b3.y); ctx.lineTo(c3.x, c3.y);
                ctx.closePath(); ctx.fill();

                // Lado Izquierdo
                ctx.fillStyle = `hsl(${hue}, ${sat}%, 25%)`; ctx.beginPath();
                ctx.moveTo(c4.x, c4.y); ctx.lineTo(b4.x, b4.y); ctx.lineTo(b3.x, b3.y); ctx.lineTo(c3.x, c3.y);
                ctx.closePath(); ctx.fill();

                // Cara Superior
                if (isGlow) { ctx.shadowColor = `hsl(${hue}, 100%, 70%)`; ctx.shadowBlur = 30 * zoom; }
                ctx.fillStyle = `hsl(${hue}, ${sat}%, 60%)`; ctx.beginPath();
                ctx.moveTo(c1.x, c1.y); ctx.lineTo(c2.x, c2.y); ctx.lineTo(c3.x, c3.y); ctx.lineTo(c4.x, c4.y);
                ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;

                // Bordes
                ctx.strokeStyle = `hsla(${hue}, 100%, 80%, 0.3)`; ctx.lineWidth = 1 * zoom; ctx.stroke();
            };

            const SabotageAlert = ({ type }) => {
                if (!type) return null;
                return (
                    <div className="absolute inset-x-0 top-1/3 flex justify-center pointer-events-none z-50">
                        <div className="bg-red-500/20 border-2 border-red-500/80 text-red-400 font-black px-6 py-2 rounded-full animate-pulse shadow-[0_0_30px_rgba(239,68,68,0.6)] flex items-center gap-2 text-lg tracking-widest backdrop-blur-md">
                            {type === 'WIND' ? '💨 VIENTO' : type === 'SPEED' ? '⚡ VELOCIDAD' : '🤏 MINI'}
                        </div>
                    </div>
                );
            };

            return (
                <div className="relative w-full h-screen overflow-hidden bg-slate-950 text-slate-100 font-sans select-none touch-none" onPointerDown={handleGlobalPointerDown}>
                    <style>{`@keyframes float { 0%,100% {transform:translate(0,0)} 50% {transform:translate(-30px,30px)} }
                    @keyframes slideUp { from {opacity:0; transform:translateY(20px)} to {opacity:1; transform:translateY(0)} }
                    .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }`}</style>
                    
                    <div className="absolute inset-0 pointer-events-none">
                        <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-950/40 via-[#020617] to-black opacity-90" />
                        <div className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-indigo-600/20 blur-[120px] rounded-full mix-blend-screen animate-pulse" />
                        <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-rose-600/10 blur-[130px] rounded-full mix-blend-screen" />
                    </div>

                    <canvas ref={canvasRef} className="absolute inset-0 block w-full h-full pointer-events-none" />

                    <button onClick={(e) => { e.stopPropagation(); if(window.parent && window.parent.showScreen) window.parent.showScreen('hub'); }}
                        className="absolute top-6 left-6 z-50 p-3 rounded-full bg-white/5 backdrop-blur-md border border-white/10 hover:bg-white/10 transition-colors group flex items-center gap-2 pr-6">
                        <div className="p-1 rounded-full bg-white/10 group-hover:bg-sky-500 transition-colors">
                            <RotateCcw className="w-4 h-4 rotate-180" />
                        </div>
                        <span className="text-[10px] font-bold tracking-[2px] uppercase opacity-60 group-hover:opacity-100 transition-opacity text-white">Salir</span>
                    </button>

                    <button onClick={(e) => { e.stopPropagation(); setIsMuted(!isMuted); audio.muted = !isMuted; }}
                        className="absolute top-6 right-6 z-50 p-3 rounded-full bg-white/5 backdrop-blur-md border border-white/10 hover:bg-white/10 transition-colors">
                        {isMuted ? <VolumeX className="w-6 h-6" /> : <Volume2 className="w-6 h-6" />}
                    </button>

                    {appState === 'MENU' && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/30 backdrop-blur-sm z-20">
                            <div className="text-center animate-slide-up">
                                <h1 className="text-8xl font-black tracking-tighter bg-gradient-to-br from-white to-slate-400 bg-clip-text text-transparent drop-shadow-2xl">STACK</h1>
                                <p className="mt-4 text-slate-400 font-medium tracking-widest opacity-80 uppercase text-xs">Precisión Cibernética <span className="text-sky-500 font-bold ml-1">V2</span></p>
                            </div>
                            <div className="mt-12 flex flex-col gap-4 w-full max-w-xs px-4 animate-slide-up" style={{animationDelay: '0.2s'}}>
                                <button onClick={(e) => { e.stopPropagation(); startGame('SINGLE'); }} className="w-full py-4 rounded-2xl bg-white text-slate-900 font-bold text-lg hover:scale-105 transition-transform shadow-xl">NORMAL</button>
                                <button onClick={(e) => { e.stopPropagation(); startGame('GRAVITY'); }} className="w-full py-4 rounded-2xl bg-amber-500 text-white font-bold text-lg hover:scale-105 transition-transform shadow-lg shadow-amber-500/20">PÉNDULO</button>
                                <button onClick={(e) => { e.stopPropagation(); startGame('LOCAL_MULTI'); }} className="w-full py-4 rounded-2xl bg-indigo-500 text-white font-bold text-lg hover:scale-105 transition-transform shadow-lg shadow-indigo-500/20">LOCAL 1 vs 1</button>
                                <button onClick={(e) => { e.stopPropagation(); startGame('LOCAL_MULTI_GRAVITY'); }} className="w-full py-4 rounded-2xl bg-rose-500 text-white font-bold text-lg hover:scale-105 transition-transform shadow-lg shadow-rose-500/20">1vs1 + SABOTAJE</button>
                            </div>
                            {leaderboard.length > 0 && (
                                <div className="mt-12 p-6 rounded-3xl bg-white/5 border border-white/10 w-72 animate-slide-up" style={{animationDelay: '0.4s'}}>
                                    <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-[3px] mb-4 text-center">Top Mundial</h3>
                                    <div className="space-y-3">
                                        {leaderboard.map((entry, idx) => (
                                            <div key={entry.id} className="flex justify-between items-center text-xs">
                                                <span className="text-slate-400 uppercase tracking-tighter">{idx + 1}. {entry.uid === user?.uid ? 'Tú' : entry.uid.slice(0,6)}</span>
                                                <span className="font-bold text-white">{entry.score}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {appState === 'PLAYING' && (
                        <div className="absolute inset-x-0 top-20 text-center pointer-events-none z-10 animate-slide-up">
                            {!gameMode.includes('LOCAL_MULTI') ? (
                                <div>
                                    <div className="text-9xl font-black text-white/20 select-none">{scores[0]}</div>
                                    <div className={`mt-2 text-yellow-500 font-bold transition-all ${combos[0] >= 2 ? 'opacity-100 scale-100' : 'opacity-0 scale-90'}`}>
                                        {combos[0]}x COMBO
                                    </div>
                                </div>
                            ) : (
                                <div className="flex justify-around items-start">
                                    <div className="flex flex-col items-center">
                                        <div className="text-xs font-bold text-indigo-400 mb-2 uppercase tracking-widest bg-indigo-500/10 px-3 py-1 rounded-full">P1</div>
                                        <div className="text-7xl font-black text-white/40">{scores[0]}</div>
                                        <SabotageAlert type={activeSabotages[0]} />
                                    </div>
                                    <div className="flex flex-col items-center">
                                        <div className="text-xs font-bold text-rose-400 mb-2 uppercase tracking-widest bg-rose-500/10 px-3 py-1 rounded-full">P2</div>
                                        <div className="text-7xl font-black text-white/40">{scores[1]}</div>
                                        <SabotageAlert type={activeSabotages[1]} />
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {appState === 'GAMEOVER' && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/80 backdrop-blur-md z-30">
                            <div className="text-center animate-slide-up">
                                <h1 className="text-4xl font-black text-white mb-8">FIN DEL JUEGO</h1>
                                {!gameMode.includes('LOCAL_MULTI') ? (
                                    <div className="mb-12">
                                        <div className="text-9xl font-black text-white mb-2">{scores[0]}</div>
                                        {isNewRecord && <div className="text-yellow-400 font-black tracking-widest text-sm bg-yellow-400/10 px-6 py-2 rounded-full border border-yellow-400/20 inline-block animate-bounce mt-4">NUEVO RÉCORD</div>}
                                    </div>
                                ) : (
                                    <div className="mb-12">
                                        <h2 className="text-2xl font-bold text-indigo-400 mb-4">{scores[0] > scores[1] ? 'GANA P1' : (scores[0] < scores[1] ? 'GANA P2' : 'EMPATE')}</h2>
                                        <div className="flex gap-8 justify-center items-center">
                                            <div className="text-4xl font-bold text-indigo-300">{scores[0]}</div>
                                            <div className="text-slate-600 font-black">VS</div>
                                            <div className="text-4xl font-bold text-rose-300">{scores[1]}</div>
                                        </div>
                                    </div>
                                )}
                                <div className="flex gap-4 w-full max-w-xs px-4">
                                    <button onClick={(e) => { e.stopPropagation(); startGame(gameMode); }} className="flex-1 py-4 rounded-2xl bg-white text-slate-900 font-bold text-lg hover:scale-105 transition-transform">REINTENTAR</button>
                                    <button onClick={(e) => { e.stopPropagation(); setAppState('MENU'); }} className="flex-1 py-4 rounded-2xl bg-white/5 border border-white/10 text-white font-bold hover:bg-white/10 transition-colors">MENÚ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
